<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Image Gallery</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preload" href="/fonts/RobotoFlex-VariableFont.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 32px;
        }
        .admin-section {
            margin-bottom: 40px;
        }
        .admin-section h2 {
            margin-top: 0;
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #cac4d0);
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--md-sys-color-outline, #79747e);
            background: transparent;
            color: var(--md-sys-color-on-surface);
            font-family: inherit;
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row > .form-group {
            flex: 1;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .users-table th, .users-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #cac4d0);
        }
        .users-table th {
            font-weight: 500;
        }
        .action-btn {
            background: none;
            border: none;
            color: var(--md-sys-color-error, #ba1a1a);
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }
        .action-btn:hover {
            text-decoration: underline;
        }
        .btn-primary {
            background: var(--md-sys-color-primary, #6750a4);
            color: var(--md-sys-color-on-primary, #ffffff);
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--md-sys-color-inverse-surface, #313033);
            color: var(--md-sys-color-inverse-on-surface, #f4eff4);
            padding: 12px 24px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }

    </style>
</head>
<body class="gallery-body">
    <header class="md-top-app-bar">
        <div class="md-top-app-bar__left">
            <a href="/" class="md-header-logout-icon-btn" style="text-decoration: none;" title="Back to Gallery">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
        </div>
        <span class="md-top-app-bar__title">Admin</span>
        <div class="md-top-app-bar__actions">
            <form method="POST" action="/logout" style="margin: 0;">
                <button type="submit" class="md-header-logout-icon-btn" title="Logout" aria-label="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                    </svg>
                </button>
            </form>
        </div>
    </header>



    <main class="admin-container">
        <section class="admin-section">
            <h2>User Management</h2>
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>

            <h3 style="margin-top: 24px;">Add New User</h3>
            <form id="add-user-form" class="form-row" style="align-items: flex-end;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Username</label>
                    <input type="text" id="new-username" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Password</label>
                    <input type="password" id="new-password" required>
                </div>
                <button type="submit" class="btn-primary">Add User</button>
            </form>
        </section>
    </main>

    <div id="toast" class="toast">Saved successfully.</div>

    <script src="/users.js"></script>
</body>
</html>
