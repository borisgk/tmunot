<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Image Gallery</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preload" href="/fonts/RobotoFlex-VariableFont.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 32px;
        }
        .admin-section {
            margin-bottom: 40px;
        }
        .admin-section h2 {
            margin-top: 0;
            border-bottom: 1px solid var(--md-sys-color-outline-variant, #cac4d0);
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--md-sys-color-outline, #79747e);
            background: transparent;
            color: var(--md-sys-color-on-surface);
            font-family: inherit;
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row > .form-group {
            flex: 1;
        }
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        .user-card {
            background: var(--md-sys-color-surface-container);
            border-radius: var(--md-sys-shape-corner-large);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .user-info {
            flex: 1;
            overflow: hidden;
        }
        .user-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-subtitle {
            font-size: 0.9rem;
            color: var(--md-sys-color-on-surface-variant);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-action-btn {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .user-action-btn:hover {
            background: var(--md-sys-color-surface-container-high);
        }
        .user-delete-btn {
            color: var(--md-sys-color-error);
        }
        .user-delete-btn:hover {
            background: var(--md-sys-color-error-container);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-surface {
            background: var(--md-sys-color-surface-container-high);
            border-radius: var(--md-sys-shape-corner-extra-large);
            padding: 32px;
            width: 100%;
            max-width: 400px;
            transform: translateY(20px);
            transition: transform 0.2s;
        }
        .modal-overlay.show .modal-surface {
            transform: translateY(0);
        }
        .modal-surface h2 {
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--md-sys-color-primary);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 32px;
        }
        .action-btn {
            background: none;
            border: none;
            color: var(--md-sys-color-error, #ba1a1a);
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }
        .action-btn:hover {
            text-decoration: underline;
        }
        .btn-primary {
            background: var(--md-sys-color-primary, #6750a4);
            color: var(--md-sys-color-on-primary, #ffffff);
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--md-sys-color-inverse-surface, #313033);
            color: var(--md-sys-color-inverse-on-surface, #f4eff4);
            padding: 12px 24px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }

    </style>
</head>
<body class="gallery-body">
    <header class="md-top-app-bar">
        <div class="md-top-app-bar__left">
            <a href="/" class="md-header-logout-icon-btn" style="text-decoration: none;" title="Back to Gallery">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
        </div>
        <span class="md-top-app-bar__title" style="display: flex; align-items: baseline; justify-content: center;">Admin <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.7; margin-left: 8px;">v<!-- APP_VERSION --></span></span>
        <div class="md-top-app-bar__actions">
            <form method="POST" action="/logout" style="margin: 0;">
                <button type="submit" class="md-header-logout-icon-btn" title="Logout" aria-label="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                    </svg>
                </button>
            </form>
        </div>
    </header>



    <main class="admin-container">
        <section class="admin-section">
            <div id="users-grid" class="users-grid">
                <!-- Loaded dynamically -->
            </div>
        </section>

        <!-- Floating Action Button -->
        <button id="fab-add-user" class="md-fab" title="Add User">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </button>

        <!-- Add User Modal -->
        <div id="add-user-modal" class="modal-overlay">
            <div class="modal-surface">
                <h2>Add New User</h2>
                <form id="add-user-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="new-username" required>
                    </div>
                    <div class="form-group">
                        <label>Real Name</label>
                        <input type="text" id="new-real-name">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="new-is-admin" style="width: auto;">
                        <label style="margin: 0;">Is Admin?</label>
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="btn-cancel-add" class="action-btn" style="color: var(--md-sys-color-on-surface-variant); margin-right: 16px;">Cancel</button>
                        <button type="submit" class="btn-primary">Add User</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit User Modal -->
        <div id="edit-user-modal" class="modal-overlay">
            <div class="modal-surface">
                <h2>Edit User</h2>
                <form id="edit-user-form">
                    <input type="hidden" id="edit-username">
                    <div class="form-group">
                        <label>Real Name</label>
                        <input type="text" id="edit-real-name">
                    </div>
                    <div class="form-group">
                        <label>New Password (leave blank to keep current)</label>
                        <input type="password" id="edit-password">
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="edit-is-admin" style="width: auto;">
                        <label style="margin: 0;">Is Admin?</label>
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="btn-cancel-edit" class="action-btn" style="color: var(--md-sys-color-on-surface-variant); margin-right: 16px;">Cancel</button>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Saved successfully.</div>

    <script src="/js/htmx.min.js" defer></script>
    <script src="/js/alpine.min.js" defer></script>
    <script src="/js/core.js" defer></script>
    <script src="/js/modals.js" defer></script>
    <script src="/js/gallery.js" defer></script>
    <script src="/js/upload.js" defer></script>
    <script src="/js/users.js" defer></script>
</body>
</html>
