<div class="album-card" @click="window.location.href='/albums/<!-- UUID -->'" style="width: 220px; background: var(--md-sys-color-surface-container); border-radius: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; display: flex; flex-direction: column;">
    <!-- COVER_HTML -->
    <div style="padding: 16px; display: flex; flex-direction: column; gap: 4px;">
        <h3 style="margin: 0; font-size: 1.1rem; font-weight: 600; color: var(--md-sys-color-on-surface); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="<!-- SAFE_NAME -->"><!-- SAFE_NAME --></h3>
        <span style="font-size: 0.85rem; color: var(--md-sys-color-on-surface-variant); font-weight: 500;"><!-- PHOTO_COUNT_TEXT --></span>
        <p style="margin: 4px 0 0 0; font-size: 0.85rem; color: var(--md-sys-color-outline); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.4em; line-height: 1.2;" title="<!-- SAFE_DESC -->"><!-- SAFE_DESC --></p>
    </div>
</div>
