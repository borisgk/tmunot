<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- ALBUM_NAME --> - Image Gallery</title>
    <link rel="stylesheet" href="/css/styles.css">
    <!-- LCP_PRELOAD -->
</head>
<body class="gallery-body">
    <header class="md-top-app-bar" id="app-bar">
        <div class="md-top-app-bar__left" id="app-bar-left">
            <a href="/albums" class="md-header-logout-icon-btn" title="Back to Albums" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
        </div>
        <span class="md-top-app-bar__title" id="app-bar-title" style="display: flex; align-items: baseline;"><!-- ALBUM_NAME --> <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.7; margin-left: 8px;">v<!-- APP_VERSION --></span></span>
        <div class="md-top-app-bar__actions" id="app-bar-actions">
<!-- GALLERY_LOGOUT -->
        </div>
    </header>

    <main class="gallery-container">
        <div class="album-info-header" style="margin-bottom: 24px;">
            <h1 style="margin: 0 0 8px 0; font-size: 2rem; font-weight: 600; color: var(--md-sys-color-on-surface);"><!-- ALBUM_NAME_HEADER --></h1>
            <p style="margin: 0; color: var(--md-sys-color-on-surface-variant); font-size: 1rem;"><!-- ALBUM_DESC_HEADER --></p>
        </div>
        <div class="gallery" id="gallery-grid">
<!-- ALBUM_PHOTOS_CONTENT -->
        </div>
    </main>
    
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="loader"></div>
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Preview">
    </div>

    <!-- SHARED_MODALS -->

    <script src="/js/htmx.min.js" defer></script>
    <script src="/js/alpine.min.js" defer></script>
    <script src="/js/core.js" defer></script>
    <script src="/js/modals.js" defer></script>
    <script src="/js/gallery.js" defer></script>
    <script src="/js/upload.js" defer></script>
    <script src="/js/users.js" defer></script>
</body>
</html>
