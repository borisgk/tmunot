<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preload" href="/fonts/RobotoFlex-VariableFont.woff2" as="font" type="font/woff2" crossorigin>
    <!-- LCP_PRELOAD -->
</head>
<body class="gallery-body">
    <header class="md-top-app-bar" id="app-bar">
        <div class="md-top-app-bar__left" id="app-bar-left"></div>
        <span class="md-top-app-bar__title" id="app-bar-title">Image Gallery</span>
        <div class="md-top-app-bar__actions" id="app-bar-actions">
<!-- GALLERY_LOGOUT -->
        </div>
    </header>

    <main class="gallery-container">
        <div class="gallery" id="gallery-grid">
<!-- GALLERY_CONTENT -->
        </div>
    </main>
    
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="loader"></div>
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Preview">
    </div>

    <!-- Global Overflow Menu -->
    <div id="global-menu" class="md-menu">
        <button class="md-menu-item" id="menu-download">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
            <span>Download</span>
        </button>
        <button class="md-menu-item md-menu-item--danger" id="menu-delete">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            <span>Delete</span>
        </button>
    </div>

    <a href="/upload" class="md-fab" title="Upload Images">+</a>

    <script src="/script.js"></script>
</body>
</html>
