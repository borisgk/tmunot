<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preload" href="/fonts/Roboto-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/fonts/Roboto-Medium.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/fonts/Roboto-Bold.ttf" as="font" type="font/ttf" crossorigin>
    <!-- LCP_PRELOAD -->
</head>
<body class="gallery-body">
    <header class="md-top-app-bar">
        <div class="md-top-app-bar__left"></div>
        <span class="md-top-app-bar__title">Image Gallery</span>
        <div class="md-top-app-bar__actions">
<!-- GALLERY_LOGOUT -->
        </div>
    </header>

    <main class="gallery-container">
        <div class="gallery" id="gallery-grid">
<!-- GALLERY_CONTENT -->
        </div>
    </main>
    
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <div class="loader"></div>
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Preview">
    </div>

    <a href="/upload" class="md-fab" title="Upload Images">+</a>

    <script src="/script.js"></script>
</body>
</html>
